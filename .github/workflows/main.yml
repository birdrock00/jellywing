name: Android build

on:
  push:
  workflow_dispatch:
  schedule:
    # GitHub Actions uses UTC. 13:00 UTC is 5AM PST.
    - cron: '0 13 * * *'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      HAS_SIGNING_KEY: ${{ secrets.STORE_DATA != '' && secrets.STORE_PASSWORD != '' && secrets.KEY_ALIAS != '' && secrets.KEY_PASSWORD != '' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'

      - name: Set build date
        id: build_date
        run: echo "tag=$(TZ=America/Los_Angeles date +'%Y-%m-%d')" >> "$GITHUB_OUTPUT"

      - name: Restore signing key
        if: env.HAS_SIGNING_KEY == 'true'
        run: echo "${STORE_DATA}" | base64 --decode > store.jks
        env:
          STORE_DATA: ${{ secrets.STORE_DATA }}

      - name: Build debug
        run: ./gradlew clean assembleDebug testDebugUnitTest --stacktrace

      - name: Build release
        if: env.HAS_SIGNING_KEY == 'true'
        env:
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: ./gradlew assembleRelease --stacktrace

      - name: Package APKs
        run: |
          mkdir -p artifacts
          find app/build/outputs/apk -name '*.apk' -print -exec cp {} artifacts/ \;
          for apk in artifacts/*.apk; do
            [ -e "$apk" ] || continue
            mv "$apk" "artifacts/jellywing-${{ steps.build_date.outputs.tag }}-$(basename "$apk")"
          done

      - name: Upload APKs
        uses: actions/upload-artifact@v4
        with:
          name: jellywing-${{ steps.build_date.outputs.tag }}
          path: artifacts/*.apk
          if-no-files-found: error

      - name: Tag daily build
        if: github.event_name == 'schedule'
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git tag -f "${{ steps.build_date.outputs.tag }}" "$GITHUB_SHA"
          git push -f origin "refs/tags/${{ steps.build_date.outputs.tag }}"

  api36-playback-smoke:
    runs-on: ubuntu-latest
    needs: build
    env:
      EXTERNAL_MEDIA_SERVER: ${{ secrets.EXTERNAL_MEDIA_SERVER }}
      EXTERNAL_MEDIA_USERNAME: ${{ secrets.EXTERNAL_MEDIA_USERNAME }}
      EXTERNAL_MEDIA_PASSWORD: ${{ secrets.EXTERNAL_MEDIA_PASSWORD }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Verify Jellyfin secrets
        run: |
          if [ -z "$EXTERNAL_MEDIA_SERVER" ] || [ -z "$EXTERNAL_MEDIA_USERNAME" ] || [ -z "$EXTERNAL_MEDIA_PASSWORD" ]; then
            echo "::error::EXTERNAL_MEDIA_SERVER, EXTERNAL_MEDIA_USERNAME, and EXTERNAL_MEDIA_PASSWORD repository secrets are required"
            exit 1
          fi

      - name: Run API 36 Jellyfin playback test
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 36
          target: default
          arch: x86_64
          profile: pixel_6
          disable-animations: true
          emulator-options: -no-window -no-audio -no-snapshot -no-boot-anim -gpu swiftshader_indirect -dns-server 8.8.8.8,1.1.1.1
          script: >
            ./gradlew :app:connectedDebugAndroidTest
            -Pandroid.testInstrumentationRunnerArguments.class=com.dkanada.gramophone.ui.JellyfinPlaybackSmokeTest
            -Pandroid.testInstrumentationRunnerArguments.jellyfinServer="$EXTERNAL_MEDIA_SERVER"
            -Pandroid.testInstrumentationRunnerArguments.jellyfinUsername="$EXTERNAL_MEDIA_USERNAME"
            -Pandroid.testInstrumentationRunnerArguments.jellyfinPassword="$EXTERNAL_MEDIA_PASSWORD"
            --stacktrace
