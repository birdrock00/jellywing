name: Android build

on:
  push:
  workflow_dispatch:
  schedule:
    # GitHub Actions uses UTC. 13:00 UTC is 5AM PST.
    - cron: '0 13 * * *'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      HAS_SIGNING_KEY: ${{ secrets.STORE_DATA != '' && secrets.STORE_PASSWORD != '' && secrets.KEY_ALIAS != '' && secrets.KEY_PASSWORD != '' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'

      - name: Set release metadata
        id: build_date
        run: |
          timestamp="$(TZ=America/Los_Angeles date +'%Y-%m-%d-%H%M%S')"
          echo "tag=apk-${timestamp}" >> "$GITHUB_OUTPUT"
          echo "title=Jellywing APK ${timestamp}" >> "$GITHUB_OUTPUT"

      - name: Restore signing key
        if: env.HAS_SIGNING_KEY == 'true'
        run: echo "${STORE_DATA}" | base64 --decode > store.jks
        env:
          STORE_DATA: ${{ secrets.STORE_DATA }}

      - name: Build debug
        run: ./gradlew clean assembleDebug testDebugUnitTest --stacktrace

      - name: Build release
        if: env.HAS_SIGNING_KEY == 'true'
        env:
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: ./gradlew assembleRelease --stacktrace

      - name: Package APKs
        run: |
          mkdir -p artifacts
          find app/build/outputs/apk -name '*.apk' -print -exec cp {} artifacts/ \;
          for apk in artifacts/*.apk; do
            [ -e "$apk" ] || continue
            mv "$apk" "artifacts/jellywing-${{ steps.build_date.outputs.tag }}-$(basename "$apk")"
          done

      - name: Upload APKs
        uses: actions/upload-artifact@v4
        with:
          name: jellywing-${{ steps.build_date.outputs.tag }}
          path: artifacts/*.apk
          if-no-files-found: error

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          notes_file="$(mktemp)"
          {
            echo "Automated Jellywing APK build."
            echo
            echo "Source commit: ${GITHUB_SHA}"
            echo "Workflow run: ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
          } > "$notes_file"
          gh release create "${{ steps.build_date.outputs.tag }}" artifacts/*.apk \
            --repo "$GITHUB_REPOSITORY" \
            --title "${{ steps.build_date.outputs.title }}" \
            --notes-file "$notes_file"
